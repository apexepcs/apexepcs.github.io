<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>APEX Engineering & Power Cooling Systems LLP</title>
    <meta name="description" content="APEX Engineering & Power Cooling Systems LLP provides comprehensive engineering and power cooling solutions for power plants and industrial facilities.">

    <style>
        :root {
            --primary: #0b4f8a;
            --secondary: #f28c28;
            --navy: #002b5c;
            --light: #f4f6f9;
        }

        html {
            scroll-behavior: smooth;
        }

        body {
            margin: 0;
            font-family: Arial, Helvetica, sans-serif;
            line-height: 1.6;
            color: #333;
            background: #ffffff;
        }

        /* ===== HEADER ===== */
        .top-header {
            background: linear-gradient(90deg, var(--primary), var(--secondary));
            color: #fff;
            padding: 15px 20px;
        }

        .header-container {
            max-width: 1200px;
            margin: auto;
            display: flex;
            align-items: center;
            gap: 20px;
        }

        .logo img {
            width: 140px;
            height: auto;
        }

        .company-details h1 {
            margin: 0;
            font-size: 28px;
            font-weight: bold;
        }

        .tagline {
            font-size: 16px;
            font-style: italic;
            margin-top: 5px;
        }

        /* ===== NAVIGATION ===== */
        nav {
            background: var(--navy);
            position: sticky;
            top: 0;
            z-index: 1000;
        }

        .nav-menu {
            list-style: none;
            margin: 0;
            padding: 0;
            display: flex;
            justify-content: center;
            flex-wrap: wrap;
        }

        .nav-menu li a {
            display: block;
            padding: 14px 18px;
            color: #fff;
            text-decoration: none;
            font-weight: bold;
            transition: background 0.3s;
        }

        .nav-menu li a:hover {
            background: var(--secondary);
        }

        /* ===== SECTIONS ===== */
        section {
            padding: 70px 20px;
            max-width: 1200px;
            margin: auto;
            scroll-margin-top: 120px;
        }

        .section-title {
            font-size: 32px;
            color: var(--primary);
            margin-bottom: 10px;
        }

        .section-divider {
            width: 100%;
            height: 4px;
            background: var(--secondary);
            margin-bottom: 40px;
            border-radius: 2px;
        }

        .about-box {
            background: #ffffff;
            padding: 30px;
            border-radius: 12px;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.08);
        }

        /* ===== CARD GRID ===== */
        .card-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 30px;
        }

        .service-card {
            background: #ffffff;
            padding: 25px 30px;
            border-radius: 12px;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.08);
            transition: transform 0.3s ease, box-shadow 0.3s ease;
        }

        .service-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.12);
        }

        .service-card h3 {
            color: #333;
            margin-bottom: 15px;
            font-size: 20px;
        }

        .service-card ul {
            padding-left: 20px;
            margin: 0;
        }

        .service-card ul li {
            margin-bottom: 10px;
        }

        /* ===== CONTACT ===== */
        .contact a {
            color: var(--primary);
            text-decoration: none;
        }

        .contact a:hover {
            text-decoration: underline;
        }

        /* ===== FOOTER ===== */
        footer {
            background: var(--navy);
            color: #fff;
            text-align: center;
            padding: 20px;
        }

        /* ===== WHATSAPP BUTTON ===== */
        .whatsapp-float {
            position: fixed;
            width: 60px;
            height: 60px;
            bottom: 20px;
            right: 20px;
            background-color: #25D366;
            color: #fff;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 28px;
            text-decoration: none;
            box-shadow: 0 2px 6px rgba(0,0,0,0.3);
            z-index: 1000;
        }

        /* ===== RESPONSIVE ===== */
        @media (max-width: 768px) {
            .header-container {
                flex-direction: column;
                text-align: center;
            }

            .company-details h1 {
                font-size: 22px;
            }
        }
    </style>
</head>
<body>
<!-- ===== HEADER ===== -->
<header class="top-header">
    <div class="header-container">
        <div class="logo">
            <img src="apex-logo.png" alt="APEX Logo">
        </div>
        <div class="company-details">
            <h1>APEX Engineering & Power Cooling Systems LLP</h1>
            <p class="tagline">Advanced Power Engineering eXperts</p>
        </div>
    </div>
</header>

<!-- ===== NAVIGATION ===== -->
<nav>
    <ul class="nav-menu">
</body>
</html>
